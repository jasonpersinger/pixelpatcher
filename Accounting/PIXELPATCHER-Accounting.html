// ── Email invoice ─────────────────────────────────────────────────────────────
function sendInvoiceEmail() {
  const jobs = DB.get('pp_jobs') || [];
  const job  = jobs.find(j => j.id === currentInvoiceJobId);
  if (!job) return;

  const customers = DB.get('pp_customers') || [];
  const customer  = job.customerId
    ? customers.find(c => c.id === job.customerId)
    : customers.find(c => (c.firstName + ' ' + c.lastName).trim() === job.customer.trim());
  const email = customer && customer.email ? customer.email.trim() : '';

  if (!email) {
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);'
      + 'border-radius:var(--radius);padding:12px 18px;font-family:var(--font);font-size:12px;'
      + 'color:var(--muted);z-index:999;max-width:300px';
    notice.textContent = 'No email on file for ' + job.customer + '. Add one in Customers.';
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 5000);
    return;
  }

  const s      = getSettings();
  const jobs2  = DB.get('pp_jobs') || [];
  const jobNum = jobs2.indexOf(job) + 1;
  const invNum = 'PP-' + new Date().getFullYear() + '-' + String(jobNum).padStart(3, '0');
  const tax    = Number(job.tax || 0);
  const total  = (Number(job.labor) + Number(job.parts) + tax).toFixed(2);

  fsdb.collection('mail').add({
    to: email,
    message: {
      subject: 'Invoice ' + invNum + ' from ' + (s.businessName || 'Pixel Patcher'),
      text: 'Hi ' + job.customer + ',\n\n'
        + 'Please find your invoice below.\n\n'
        + 'Invoice #: ' + invNum + '\n'
        + 'Date: ' + today() + '\n\n'
        + (job.service ? 'Service: ' + job.service + '\n' : '')
        + (job.issue   ? 'Issue: '   + job.issue   + '\n' : '')
        + (Number(job.labor) > 0 ? 'Labor: $' + Number(job.labor).toFixed(2) + '\n' : '')
        + (Number(job.parts) > 0 ? 'Parts: $' + Number(job.parts).toFixed(2) + '\n' : '')
        + (tax > 0              ? 'Tax: $'   + tax.toFixed(2)               + '\n' : '')
        + '\nTOTAL DUE: $' + total + '\n\n'
        + 'Payment accepted: Cash \u00b7 Venmo \u00b7 CashApp \u00b7 Square\n'
        + 'Questions? Text or call ' + (s.phone || '') + '\n\n'
        + 'Thank you for choosing ' + (s.businessName || 'Pixel Patcher') + '!',
    },
  }).then(() => {
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--accent);'
      + 'border-radius:var(--radius);padding:12px 18px;font-family:var(--font);font-size:12px;'
      + 'color:var(--accent);z-index:999;max-width:300px';
    notice.textContent = '✓ Invoice emailed to ' + email;
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 5000);
  }).catch(err => {
    console.warn('Invoice email failed:', err);
    alert('Failed to send email. Check console.');
  });
}

// ── Booking requests importer ─────────────────────────────────────────────────
async function loadBookingRequests() {
  const user = fsauth.currentUser;
  if (!user) return;
  try {
    const snap = await fsdb.collection('bookingRequests')
      .where('processed', '==', false)
      .orderBy('createdAt', 'asc')
      .get();
    if (snap.empty) return;

    const requests = [];
    snap.forEach(doc => requests.push(doc.data()));

    // Show import banner on dashboard
    const banner = document.createElement('div');
    banner.id = 'booking-import-banner';
    banner.style.cssText = 'background:rgba(201,160,0,0.12);border:1px solid var(--accent);'
      + 'border-radius:var(--radius);padding:14px 20px;margin-bottom:20px;'
      + 'display:flex;align-items:center;justify-content:space-between;font-family:var(--font)';
    const msg = document.createElement('span');
    msg.style.cssText = 'font-size:13px;color:var(--accent)';
    msg.textContent = '★ ' + requests.length + ' new booking request'
      + (requests.length > 1 ? 's' : '') + ' from the website';
    const importBtn = document.createElement('button');
    importBtn.className = 'btn btn-primary';
    importBtn.style.cssText = 'font-size:12px;padding:6px 16px';
    importBtn.textContent = 'Import as Pending Jobs';
    importBtn.addEventListener('click', () => importBookingRequests(requests));
    banner.appendChild(msg);
    banner.appendChild(importBtn);

    const dashboard = document.getElementById('dashboard');
    if (dashboard) {
      const existing = document.getElementById('booking-import-banner');
      if (existing) existing.remove();
      dashboard.prepend(banner);
    }
  } catch(err) {
    console.warn('loadBookingRequests failed:', err);
  }
}

async function importBookingRequests(requests) {
  for (const r of requests) {
    // Create customer if needed
    const custs = DB.get('pp_customers') || [];
    let cust = custs.find(c =>
      c.phone === r.phone ||
      (c.firstName + ' ' + c.lastName).trim().toLowerCase() === r.name.toLowerCase()
    );
    if (!cust) {
      const nameParts = r.name.trim().split(' ');
      cust = {
        id: uid(), firstName: nameParts[0], lastName: nameParts.slice(1).join(' '),
        phone: r.phone, email: r.email || '', street: '', city: '', state: '', zip: '', notes: '',
      };
      DB.push('pp_customers', cust);
    }

    // Create pending job
    DB.push('pp_jobs', {
      id: uid(),
      date: r.preferredDate || today(),
      customer: r.name,
      customerId: cust.id,
      phone: r.phone,
      address: '',
      issue: r.issue,
      service: '',
      device: r.device || '',
      model: '',
      notes: 'Booked via website' + (r.email ? ' · ' + r.email : ''),
      labor: 0, parts: 0, tax: 0,
      status: 'Pending',
      paid: false,
      source: 'booking',
    });

    // Mark processed in Firestore
    await fsdb.collection('bookingRequests').doc(r.id).update({ processed: true });
  }

  // Remove banner and re-render dashboard
  const banner = document.getElementById('booking-import-banner');
  if (banner) banner.remove();
  renderDashboard();
  alert(requests.length + ' job' + (requests.length > 1 ? 's' : '') + ' imported as Pending.');
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const settings = getSettings();
  const income   = DB.get('pp_income')   || [];
  const expenses = DB.get('pp_expenses') || [];
  const mileage  = DB.get('pp_mileage')  || [];
  const jobs     = DB.get('pp_jobs')     || [];

  const revenue    = income.filter(i => i.type !== 'Owner Contribution')
                           .reduce((s, i) => s + Number(i.amount), 0);
  const totalExp   = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const netProfit  = revenue - totalExp;
  const jobsDone   = jobs.filter(j => j.status === 'Complete' || j.status === 'Closed').length;
  const avgJob     = jobsDone > 0 ? revenue / jobsDone : 0;
  const totalMiles = mileage.reduce((s, m) => s + Number(m.miles), 0);
  const mileDed    = mileage.reduce((s, m) => s + Number(m.deduction), 0);
  const taxReserve        = Math.max(0, netProfit * settings.taxReserve);
  const salesTaxCollected = jobs.filter(j => j.paid).reduce((s, j) => s + Number(j.tax || 0), 0);

  const mInc = Array(12).fill(0);
  const mExp = Array(12).fill(0);
  income.filter(i => i.type !== 'Owner Contribution').forEach(i => {
    const d = new Date(i.date);
    if (d.getFullYear() === new Date().getFullYear()) mInc[d.getMonth()] += Number(i.amount);
  });
  expenses.forEach(e => {
    const d = new Date(e.date);
    if (d.getFullYear() === new Date().getFullYear()) mExp[d.getMonth()] += Number(e.amount);
  });
  const maxVal = Math.max(...mInc, ...mExp, 1);
  const curMon = new Date().getMonth();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // ── Right Now computations ────────────────────────────────────────────────
  const curYear     = new Date().getFullYear();
  const prevMonIdx  = curMon === 0 ? 11 : curMon - 1;
  const prevMonYear = curMon === 0 ? curYear - 1 : curYear;

  const outstanding    = jobs.filter(j => !j.paid && j.status !== 'Closed')
                             .reduce((s, j) => s + Number(j.labor) + Number(j.parts) + Number(j.tax || 0), 0);
  const unpaidJobs     = jobs.filter(j => !j.paid && j.status !== 'Closed');
  const unpaidCount    = unpaidJobs.length;
  const oldestUnpaid   = unpaidJobs.length > 0
    ? Math.max(...unpaidJobs.map(j => daysSince(j.date)))
    : 0;
  const outstandingSub = unpaidCount > 0
    ? unpaidCount + ' unpaid job' + (unpaidCount > 1 ? 's' : '') + (oldestUnpaid > 0 ? ', oldest ' + oldestUnpaid + 'd' : '')
    : 'All clear';

  const pipeJobs    = jobs.filter(j => ['Pending','In Progress','Awaiting Parts'].includes(j.status));
  const pipeCount   = pipeJobs.length;
  const pipePending = pipeJobs.filter(j => j.status === 'Pending').length;
  const pipeInProg  = pipeJobs.filter(j => j.status === 'In Progress').length;
  const pipeAwaiting= pipeJobs.filter(j => j.status === 'Awaiting Parts').length;
  const pipeSub     = pipeCount > 0
    ? [pipePending  > 0 ? pipePending  + ' pending'        : '',
       pipeInProg   > 0 ? pipeInProg   + ' in progress'    : '',
       pipeAwaiting > 0 ? pipeAwaiting + ' awaiting parts' : '']
       .filter(Boolean).join(' \xB7 ')
    : 'No active jobs';

  const curMonRev  = income.filter(i => i.type !== 'Owner Contribution').filter(i => {
    const d = new Date(i.date); return d.getFullYear() === curYear && d.getMonth() === curMon;
  }).reduce((s, i) => s + Number(i.amount), 0);
  const prevMonRev = income.filter(i => i.type !== 'Owner Contribution').filter(i => {
    const d = new Date(i.date); return d.getFullYear() === prevMonYear && d.getMonth() === prevMonIdx;
  }).reduce((s, i) => s + Number(i.amount), 0);
  const momPct     = prevMonRev > 0
    ? Math.round(((curMonRev - prevMonRev) / prevMonRev) * 100)
    : null;
  const momSub     = momPct === null ? 'No data last month'
    : (momPct >= 0 ? '\u2191' : '\u2193') + ' ' + Math.abs(momPct) + '% vs ' + months[prevMonIdx];
  const momCls     = momPct === null ? '' : momPct >= 0 ? 'kpi-positive' : 'kpi-negative';

  const todayStr     = today();
  const followups    = DB.get('pp_followups') || [];
  const fuDue        = followups.filter(f => !f.done && f.dueDate <= todayStr);
  const fuOverdue    = fuDue.filter(f => f.dueDate < todayStr).length;
  const fuDueCount   = fuDue.length;
  const fuCls        = fuDueCount > 0 ? 'kpi-negative' : 'kpi-positive';
  const fuSub        = fuDueCount === 0 ? 'All clear'
    : fuOverdue > 0 ? fuOverdue + ' overdue' : 'Due today';

  const kpi = (label, value, cls, sub) => `
    <div class="kpi-card">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value ${cls}">${value}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`;

  const pendingInquiries = jobs.filter(j => j.status === 'Pending' && !j.service);
  const inquiryBanner = pendingInquiries.length > 0
    ? `<div style="background:rgba(201,160,0,0.12);border:1px solid var(--accent);border-radius:var(--radius);
                   padding:12px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between">
         <span style="font-family:var(--font);font-size:12px;color:var(--accent)">
           &#9733; ${pendingInquiries.length} new website inquir${pendingInquiries.length > 1 ? 'ies' : 'y'} waiting
         </span>
         <button class="btn btn-ghost" style="font-size:11px;padding:4px 12px"
           onclick="showSection('jobs')">View Jobs &rarr;</button>
       </div>`
    : '';

  document.getElementById('dashboard').innerHTML = `
    ${inquiryBanner}
    <div class="page-title">Dashboard &mdash; ${curYear}</div>
    <div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
                  letter-spacing:1px;margin-bottom:12px">Right Now</div>
      <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr)">
        ${kpi('Outstanding Balance', fmt(outstanding), outstanding > 0 ? 'kpi-accent' : 'kpi-positive', outstandingSub)}
        ${kpi('Active Pipeline', pipeCount, pipeCount > 0 ? 'kpi-accent' : '', pipeSub)}
        ${kpi('This Month', fmt(curMonRev), momCls || (curMonRev > 0 ? 'kpi-positive' : ''), momSub)}
        ${kpi('Follow-ups Due', fuDueCount, fuCls, fuSub)}
      </div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
                  letter-spacing:1px;margin-bottom:12px">P&amp;L &mdash; Year to Date</div>
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
        ${kpi('Total Income',   fmt(revenue),   revenue > 0 ? 'kpi-positive' : '', 'Year to Date')}
        ${kpi('Total Expenses', fmt(totalExp),  'kpi-negative', 'Year to Date')}
        ${kpi('Net Profit',     fmt(netProfit), netProfit >= 0 ? 'kpi-positive' : 'kpi-negative', 'Year to Date')}
      </div>
    </div>
    <div style="margin-bottom:8px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
                  letter-spacing:1px;margin-bottom:12px">Operations</div>
      <div class="kpi-grid" style="grid-template-columns:repeat(2,1fr)">
        ${kpi('Jobs Completed', jobsDone,    'kpi-accent', 'Year to Date')}
        ${kpi('Avg Job Value',  fmt(avgJob), avgJob > 0 ? 'kpi-positive' : '', 'Per Completed Job')}
      </div>
    </div>
    <div style="margin-bottom:28px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
                  letter-spacing:1px;margin-bottom:12px">Set Aside</div>
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
        ${kpi('Tax Reserve (' + Math.round(settings.taxReserve * 100) + '%)',
              fmt(taxReserve), 'kpi-warning', 'Set This Aside')}
        ${kpi('Sales Tax Collected', fmt(salesTaxCollected), 'kpi-warning', 'Set Aside')}
        ${kpi('Mileage Deduction', fmt(mileDed), 'kpi-positive', 'IRS $' + settings.irsRate + '/mile')}
      </div>
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:600;color:var(--muted);
                  text-transform:uppercase;letter-spacing:1px;margin-bottom:16px">
        Monthly Breakdown &mdash; ${curYear}
      </div>
      <div class="chart-bar-wrap">
        ${months.map((m, i) => {
          const hInc = Math.round((mInc[i] / maxVal) * 110);
          const hExp = Math.round((mExp[i] / maxVal) * 110);
          const dim  = i === curMon ? '' : 'opacity:0.45;';
          const bold = i === curMon ? 'font-weight:700;color:var(--text)' : 'color:var(--muted)';
          return `
            <div class="chart-col">
              <div class="chart-col-bars">
                <div class="bar-income"  style="height:${hInc}px;${dim}" title="Income: ${fmt(mInc[i])}"></div>
                <div class="bar-expense" style="height:${hExp}px;${dim}" title="Expenses: ${fmt(mExp[i])}"></div>
              </div>
              <div class="chart-label" style="${bold}">${m}</div>
            </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted)">
        <span><span style="color:var(--positive)">&#9632;</span> Income</span>
        <span><span style="color:var(--negative)">&#9632;</span> Expenses</span>
      </div>
    </div>
    ${(() => {
      const paidJobs  = jobs.filter(j => j.paid && j.service);
      if (paidJobs.length === 0) return '';
      const byService = {};
      paidJobs.forEach(j => {
        const svc = j.service || 'Other';
        byService[svc] = (byService[svc] || 0) + Number(j.labor) + Number(j.parts);
      });
      const sorted  = Object.entries(byService).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const maxSvc  = sorted[0][1] || 1;
      return '<div class="card" style="margin-top:20px">'
        + '<div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px">Revenue by Service</div>'
        + sorted.map(([svc, amt]) =>
            '<div style="margin-bottom:12px">'
            + '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">'
            + '<span>' + esc(svc) + '</span>'
            + '<span style="color:var(--positive)">' + fmt(amt) + '</span>'
            + '</div>'
            + '<div style="height:6px;background:var(--border);border-radius:3px">'
            + '<div style="height:6px;background:var(--positive);border-radius:3px;width:' + Math.round((amt/maxSvc)*100) + '%"></div>'
            + '</div></div>'
          ).join('')
        + '</div>';
    })()}
  `;
}

// ── Export / Import ──────────────────────────────────────────────────────────
function exportCSV() {
  const sections = [
    { name: 'INCOME',   rows: DB.get('pp_income')   || [] },
    { name: 'EXPENSES', rows: DB.get('pp_expenses') || [] },
    { name: 'MILEAGE',  rows: DB.get('pp_mileage')  || [] },
    { name: 'JOBS',     rows: DB.get('pp_jobs')     || [] },
  ];
  const csvEsc = v => {
    const s = String(v ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n')
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  let out = '';
  sections.forEach(({ name, rows }) => {
    if (rows.length === 0) return;
    out += '\n' + name + '\n';
    out += Object.keys(rows[0]).map(csvEsc).join(',') + '\n';
    rows.forEach(r => { out += Object.values(r).map(csvEsc).join(',') + '\n'; });
  });
  const blob = new Blob([out.trim()], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PixelPatcher-' + today() + '.csv';
  a.click();
}

function exportJSON() {
  const data = {
    income: DB.get('pp_income') || [], expenses: DB.get('pp_expenses') || [],
    mileage: DB.get('pp_mileage') || [], jobs: DB.get('pp_jobs') || [],
    settings: getSettings(), exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PixelPatcher-backup-' + today() + '.json';
  a.click();
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.income)   DB.set('pp_income',   data.income);
        if (data.expenses) DB.set('pp_expenses',  data.expenses);
        if (data.mileage)  DB.set('pp_mileage',   data.mileage);
        if (data.jobs)     DB.set('pp_jobs',      data.jobs);
        if (data.settings) DB.set('pp_settings',  data.settings);
        alert('Import successful. Reloading...');
        location.reload();
      } catch {
        alert('Import failed \u2014 file may be corrupted or wrong format.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
