  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000000; --sidebar: #0d0a12; --card: #141410; --border: #2a1a3a;
      --accent: #C9A000; --positive: #22c55e; --negative: #ef4444;
      --warning: #4B2A8C; --purple: #4B2A8C; --text: #EDE8DC; --muted: #7a6a50;
      --radius: 8px; --font: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      --font-pixel: 'Press Start 2P', 'Courier New', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; }
    #top-banner {
      height: 48px; width: 100%;
      background-image: url('pixelpatcher_header_chunky.png');
      background-size: cover; background-position: center;
      display: flex; align-items: center; padding: 0 12px;
      position: relative; z-index: 100; flex-shrink: 0;

    #app { display: flex; height: calc(100vh - 48px); }
    #sidebar {
      width: 185px; min-width: 185px; background: var(--sidebar);
      border-right: 1px solid var(--border); display: flex;
      flex-direction: column; padding: 20px 12px;
    }
    .logo { display: none; }
    nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-btn {
      background: none; border: none; color: var(--muted); text-align: left;
      padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
      font-size: 14px; font-family: var(--font); transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--card); color: var(--text); }
    .nav-btn.active { background: var(--purple); color: var(--accent); font-weight: 700; }
    .sidebar-footer { display: flex; flex-direction: column; gap: 6px;
                      padding-top: 16px; border-top: 1px solid var(--border); margin-top: 16px; }
    .sidebar-footer button {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 7px; font-size: 12px; cursor: pointer;
      font-family: var(--font);
    }
    .sidebar-footer button:hover { border-color: var(--accent); color: var(--text); }
    #main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .section { display: none; }
    .section.active { display: block; }
    .page-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--accent); letter-spacing: 0.5px; }
    .card { background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 18px 20px; }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                 letter-spacing: 1px; margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 700; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .kpi-positive { color: var(--positive); }
    .kpi-negative { color: var(--negative); }
    .kpi-accent   { color: var(--accent); }
    .kpi-warning  { color: var(--warning); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                 gap: 12px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; color: var(--muted); }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius); padding: 9px 12px; font-size: 14px;
      font-family: var(--font); outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(201,160,0,0.15); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .btn { border: none; border-radius: var(--radius); padding: 9px 18px;
           font-size: 14px; cursor: pointer; font-family: var(--font);
           font-weight: 500; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
    .btn-success { background: var(--positive); color: #fff; }
    .btn-danger  { background: var(--negative); color: #fff; font-size: 12px; padding: 5px 10px; }
    .btn-ghost   { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: var(--muted); font-size: 11px;
         text-transform: uppercase; letter-spacing: 0.5px;
         border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px;
             font-size: 11px; font-weight: 600; }
    .badge-pending  { background: rgba(245,158,11,0.15);  color: var(--warning); }
    .badge-progress { background: rgba(79,142,247,0.15);  color: var(--accent); }
    .badge-complete { background: rgba(34,197,94,0.15);   color: var(--positive); }
    .badge-awaiting { background: rgba(100,116,139,0.15); color: var(--muted); }
    .badge-closed   { background: rgba(100,116,139,0.10); color: var(--muted); }
    .badge-warranty { background: rgba(100,116,139,0.10); color: var(--muted); }
    .section-header { display: flex; align-items: center; justify-content: space-between;
                      margin-bottom: 20px; }
    .totals-bar { display: flex; gap: 24px; margin-bottom: 20px; background: var(--card);
                  border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; }
    .total-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
    .total-item span  { font-size: 18px; font-weight: 700; }
    .add-form { background: var(--card); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: none; }
    .add-form.open { display: block; }
    .chart-bar-wrap { display: flex; align-items: flex-end; gap: 6px;
                      height: 140px; padding-bottom: 4px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .chart-col-bars { flex: 1; width: 100%; display: flex;
                      flex-direction: column; justify-content: flex-end; gap: 2px; }
    .bar-income, .bar-expense { width: 100%; border-radius: 3px 3px 0 0; min-height: 0; }
    .bar-income  { background: var(--positive); }
    .bar-expense { background: var(--negative); }
    .chart-label { font-size: 10px; }

    /* ── Sidebar backdrop (mobile) ─────────────────────────────── */
    #sidebar-backdrop {
      display: none; position: fixed; inset: 0; top: 48px;
      background: rgba(0,0,0,0.6); z-index: 150;
    }
    #sidebar-backdrop.open { display: block; }

    /* ── Mobile responsive ─────────────────────────────────────── */
    @media (max-width: 768px) {
      #hamburger-btn { display: flex !important; }

      #sidebar {
        position: fixed; top: 48px; left: 0;
        height: calc(100vh - 48px); z-index: 200;
        transform: translateX(-185px);
        transition: transform 0.2s ease;
      }
      #sidebar.open { transform: translateX(0); }

      #main { padding: 20px 16px; width: 100%; }

      .kpi-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      /* Single-col overrides become 1-col on very small screens */
      @media (max-width: 400px) {
        .kpi-grid { grid-template-columns: 1fr !important; }
      }

      /* Form grids already use auto-fit — fine on mobile */

      /* Tables scroll horizontally — already handled by .table-wrap */

      /* Page title smaller on mobile */
      .page-title { font-size: 15px; }

      /* Totals bar wraps */
      .totals-bar { flex-wrap: wrap; gap: 12px; }
    }
  </style>
</head>

<script>
// ── Sidebar toggle (mobile) ───────────────────────────────────────────────────
function toggleSidebar() {
  const sidebar  = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  const isOpen   = sidebar.classList.contains('open');
  if (isOpen) {
    sidebar.classList.remove('open');
    backdrop.classList.remove('open');
  } else {
    sidebar.classList.add('open');
    backdrop.classList.add('open');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('open');
}

// ── Firebase init ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD9DXFXJEudx4ODE-P1yYxAniM4jtqytJY",
  authDomain: "pixelpatcher-accounting.firebaseapp.com",
  projectId: "pixelpatcher-accounting",
  storageBucket: "pixelpatcher-accounting.firebasestorage.app",
  messagingSenderId: "1070850498937",
  appId: "1:1070850498937:web:774c2fb89d1da372a00fa8"
};
firebase.initializeApp(firebaseConfig);
const fsdb      = firebase.firestore();
const fsauth    = firebase.auth();
const fsstorage = firebase.storage();

// ── Auth ─────────────────────────────────────────────────────────────────────
const FS_KEYS = ['pp_settings','pp_income','pp_expenses','pp_mileage','pp_jobs','pp_seeded','pp_followups','pp_customers','pp_templates'];

function showSignInOverlay() {
  document.getElementById('signin-overlay').style.display = 'flex';
}
function hideSignInOverlay() {
  document.getElementById('signin-overlay').style.display = 'none';
}

function signInWithGoogle() {
  document.getElementById('signin-error').textContent = '';
  const provider = new firebase.auth.GoogleAuthProvider();
  fsauth.signInWithPopup(provider).catch(() => {
    document.getElementById('signin-error').textContent = 'Sign-in failed. Please try again.';
  });
}

// ── Sync status ───────────────────────────────────────────────────────────────
function updateSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const span = document.createElement('span');
  if (state === 'syncing') {
    span.style.color = 'var(--accent)';
    span.textContent = '\u27F3 Syncing';
  } else if (state === 'synced') {
    span.style.color = 'var(--positive)';
    span.textContent = '\u25CF Synced';
  } else {
    span.style.color = 'var(--muted)';
    span.textContent = '\u25CB Offline';
  }
  el.textContent = '';
  el.appendChild(span);
}

// ── Firestore write helper ────────────────────────────────────────────────────
function firestoreSet(key, value) {
  const user = fsauth.currentUser;
  if (!user || !FS_KEYS.includes(key)) return;
  updateSyncStatus('syncing');
  fsdb.collection('users').doc(user.uid).collection('data').doc(key)
    .set({ value })
    .then(() => updateSyncStatus('synced'))
    .catch(err => {
      console.warn('Firestore write failed:', err);
      updateSyncStatus('offline');
    });
}

// ── Load from Firestore on login ──────────────────────────────────────────────
async function loadFromFirestore(uid) {
  updateSyncStatus('syncing');
  try {
    const snap = await fsdb.collection('users').doc(uid).collection('data').get();
    if (!snap.empty) {
      snap.forEach(doc => {
        localStorage.setItem(doc.id, JSON.stringify(doc.data().value));
      });
    }
    updateSyncStatus('synced');
  } catch (err) {
    console.warn('Firestore load failed, using localStorage:', err);
    updateSyncStatus('offline');
  }
}

// ── Auth state handler ────────────────────────────────────────────────────────
const ALLOWED_EMAILS = ['jason.persinger@gmail.com'];

fsauth.onAuthStateChanged(async user => {
  if (user) {
    if (!ALLOWED_EMAILS.includes(user.email)) {
      fsauth.signOut();
      showSignInOverlay();
      alert('Access denied: ' + user.email + ' is not authorized.');
      return;
    }
    hideSignInOverlay();
    await loadFromFirestore(user.uid);
    seedData();
    renderDashboard();
    loadBookingRequests();
  } else {
    showSignInOverlay();
  }
});

// ── Pay modal ─────────────────────────────────────────────────────────────────
let _payJobId = null;

function openPayModal(id) {
  _payJobId = id;
  const sel = document.getElementById('pay-modal-method');
  sel.innerHTML = PAY_METHODS.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
  document.getElementById('pay-modal').style.display = 'flex';
}

function closePayModal() {
  document.getElementById('pay-modal').style.display = 'none';
  _payJobId = null;
}

function confirmMarkPaid() {
  const method = document.getElementById('pay-modal-method').value;
  closePayModal();
  markPaid(_payJobId, method);
}

// ── Receipt upload ────────────────────────────────────────────────────────────
let _receiptExpenseId = null;
let _receiptKey       = 'pp_expenses';
let _receiptRenderFn  = null;
let _receiptField     = 'receiptUrl';

function openReceiptModal(id, key, renderFn, field) {
  _receiptExpenseId = id;
  _receiptKey       = key      || 'pp_expenses';
  _receiptRenderFn  = renderFn || renderExpenses;
  _receiptField     = field    || 'receiptUrl';
  document.getElementById('receipt-progress').textContent = '';
  document.getElementById('receipt-file-input').value   = '';

  document.getElementById('receipt-modal').style.display = 'none';
  _receiptExpenseId = null;
}

function closeEditModal() {
  document.getElementById('edit-modal').style.display = 'none';
}

function handleReceiptFile(event) {
  const file = event.target.files[0];
  if (!file || !_receiptExpenseId) return;
  const user = fsauth.currentUser;
  if (!user) return;

  const progressEl = document.getElementById('receipt-progress');
  progressEl.textContent = 'Uploading\u2026';

  const path = 'users/' + user.uid + '/receipts/' + _receiptExpenseId;
  const ref  = fsstorage.ref(path);

  ref.put(file).then(snapshot => snapshot.ref.getDownloadURL()).then(url => {
    const items = DB.get(_receiptKey) || [];
    DB.set(_receiptKey, items.map(e =>
      e.id === _receiptExpenseId ? Object.assign({}, e, { [_receiptField]: url }) : e
    ));
    closeReceiptModal();
    _receiptRenderFn();
  }).catch(err => {
    console.warn('Receipt upload failed:', err);
    progressEl.textContent = 'Upload failed. Please try again.';
  });
}

function viewReceipt(url) {
  window.open(url, '_blank', 'noopener');
}

// ── XSS safety: all user strings escaped before innerHTML insertion ──────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Tax tab ───────────────────────────────────────────────────────────────────
function renderTax() {
  const settings  = getSettings();
  const rate      = settings.taxReserve || 0.25;
  const allIncome = (DB.get('pp_income') || []).filter(i => i.type !== 'Owner Contribution');
  const allExp    = DB.get('pp_expenses') || [];
  const year      = 2026;

  function qData(startMonth, endMonth) {
    const inc = allIncome.filter(i => {
      const d = new Date(i.date);
      return d.getFullYear() === year && d.getMonth() >= startMonth && d.getMonth() <= endMonth;
    }).reduce((s, i) => s + Number(i.amount), 0);
    const exp = allExp.filter(e => {
      const d = new Date(e.date);
      return d.getFullYear() === year && d.getMonth() >= startMonth && d.getMonth() <= endMonth;
    }).reduce((s, e) => s + Number(e.amount), 0);
    const net = inc - exp;
    return { inc, exp, net, tax: Math.max(0, net * rate) };
  }

  const quarters = [
    { label: 'Q1', range: 'Jan \u2013 Mar', months: [0, 2],  due: 'April 15, 2026' },
    { label: 'Q2', range: 'Apr \u2013 Jun', months: [3, 5],  due: 'June 15, 2026' },
    { label: 'Q3', range: 'Jul \u2013 Sep', months: [6, 8],  due: 'Sept 15, 2026' },
    { label: 'Q4', range: 'Oct \u2013 Dec', months: [9, 11], due: 'Jan 15, 2027' },
  ].map(q => Object.assign({}, q, qData(q.months[0], q.months[1])));

  const curMonth = new Date().getMonth();
  const curQ     = curMonth < 3 ? 0 : curMonth < 6 ? 1 : curMonth < 9 ? 2 : 3;

  const annualNet = quarters.reduce((s, q) => s + q.net, 0);
  const annualTax = Math.max(0, annualNet * rate);

  function qCard(q, isCurrent) {
    if (isCurrent) {
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);padding:28px;margin-bottom:16px';

      const header = document.createElement('div');
      header.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px';

      const titleBlock = document.createElement('div');
      const titleEl = document.createElement('div');
      titleEl.style.cssText = 'font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px';
      titleEl.textContent = q.label + ' \u2014 Current Quarter';
      const rangeEl = document.createElement('div');
      rangeEl.style.cssText = 'font-size:12px;color:var(--muted);margin-top:2px';
      rangeEl.textContent = q.range;
      titleBlock.appendChild(titleEl);
      titleBlock.appendChild(rangeEl);

      const dueBadge = document.createElement('div');
      dueBadge.style.cssText = 'background:var(--accent);color:#000;font-size:11px;font-weight:700;padding:4px 12px;border-radius:12px';
      dueBadge.textContent = 'DUE ' + q.due.toUpperCase();

      header.appendChild(titleBlock);
      header.appendChild(dueBadge);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:8px';

      [
        { label: 'Income',   value: fmt(q.inc), color: 'var(--positive)' },
        { label: 'Expenses', value: fmt(q.exp), color: 'var(--negative)' },
        { label: 'Net Profit', value: fmt(q.net), color: q.net >= 0 ? 'var(--positive)' : 'var(--negative)' },
      ].forEach(({ label, value, color }) => {
        const cell = document.createElement('div');
        const lbl = document.createElement('div');
        lbl.style.cssText = 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px';
        lbl.textContent = label;
        const val = document.createElement('div');
        val.style.cssText = 'font-size:22px;font-weight:700;color:' + color;
        val.textContent = value;
        cell.appendChild(lbl);
        cell.appendChild(val);
        grid.appendChild(cell);
      });

      const taxBlock = document.createElement('div');
      taxBlock.style.cssText = 'border-top:1px solid var(--border);padding-top:16px;margin-top:8px';
      const taxLbl = document.createElement('div');

      taxLbl.textContent = 'Estimated Tax to Set Aside';

      taxBlock.appendChild(taxLbl);
      taxBlock.appendChild(taxVal);

      card.appendChild(header);
      card.appendChild(grid);
      card.appendChild(taxBlock);
      return card;
    } else {
      const card = document.createElement('div');
      card.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;opacity:0.75';

      const header = document.createElement('div');
      header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px';
      const labelEl = document.createElement('div');
      const qLabel = document.createElement('span');
      qLabel.style.cssText = 'font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px';
      qLabel.textContent = q.label;
      const qRange = document.createElement('span');
      qRange.style.cssText = 'font-size:11px;color:var(--muted);margin-left:8px';
      qRange.textContent = q.range;
      labelEl.appendChild(qLabel);
      labelEl.appendChild(qRange);
      const dueEl = document.createElement('span');
      dueEl.style.cssText = 'font-size:11px;color:var(--muted)';
      dueEl.textContent = 'Due ' + q.due;
      header.appendChild(labelEl);
      header.appendChild(dueEl);

      const stats = document.createElement('div');
      stats.style.cssText = 'display:flex;gap:32px';
      [
        { label: 'Net Profit', value: fmt(q.net), color: q.net >= 0 ? 'var(--positive)' : 'var(--negative)' },

        cell.appendChild(val);
        stats.appendChild(cell);
      });

      card.appendChild(header);
      card.appendChild(stats);
      return card;
    }
  }

  const section = document.getElementById('tax');
  section.textContent = '';

  const title = document.createElement('div');
  title.className = 'page-title';
  title.textContent = 'Tax Estimates \u2014 ' + year;
  section.appendChild(title);

  // Annual summary card
  const annualCard = document.createElement('div');
  annualCard.className = 'card';
  annualCard.style.marginBottom = '24px';
  const annualLabel = document.createElement('div');
  annualLabel.style.cssText = 'font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px';

  const annualGrid = document.createElement('div');

  [
    { label: 'Net Profit YTD', value: fmt(annualNet), color: annualNet >= 0 ? 'var(--positive)' : 'var(--negative)' },
    { label: 'Total Est. Tax', value: fmt(annualTax), color: 'var(--warning)' },
    { label: 'Reserve Rate',   value: Math.round(rate * 100) + '%', color: 'var(--accent)', sub: 'Adjust in Settings' },
  ].forEach(({ label, value, color, sub }) => {
    const cell = document.createElement('div');
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px';

  annualCard.appendChild(annualLabel);
  annualCard.appendChild(annualGrid);
  section.appendChild(annualCard);

  // Quarter cards
  quarters.forEach((q, i) => section.appendChild(qCard(q, i === curQ)));

  // Disclaimer
  const note = document.createElement('div');
  note.style.cssText = 'font-size:11px;color:var(--muted);text-align:center;margin-top:8px;padding:16px';
  note.textContent = 'Estimates based on your ' + Math.round(rate * 100) + '% tax reserve rate \u2014 actual liability may vary. Consult a tax professional.';
  section.appendChild(note);
}

  DB.del('pp_templates', id);

}

function loadTemplate(id) {
  const tmpls = DB.get('pp_templates') || [];
  const t = tmpls.find(x => x.id === id);
  if (!t) return;
  // Open the add job form if not already open
  const form = document.getElementById('job-form');
  if (form && !form.classList.contains('open')) form.classList.add('open');
  // Pre-fill fields
  const set = (elId, val) => { const el = document.getElementById(elId); if (el) el.value = val || ''; };
  set('j-device',  t.device);
  set('j-model',   t.model);
  set('j-issue',   t.issue);
  set('j-service', t.service);
  set('j-labor',   t.labor || '');
  // Scroll to form
  const jobSection = document.getElementById('jobs');
  if (jobSection) jobSection.scrollTo({ top: 0, behavior: 'smooth' });
}

        <div class="form-group"><label>Link to Job <span style="color:var(--muted);font-weight:400">(optional)</span></label>
          <select id="e-job">

              </td>
            </tr>`).join('')}
      </tbody>
    </table></div>
  `;
}

    id: uid(), date: document.getElementById('e-date').value,

// ── Customers section ────────────────────────────────────────────────────────
let _customerView   = null;
let _customerSearch = '';

function showCustomer(name) {
  _customerView = name;
  renderCustomers();
}

function renderCustomers() {
  if (_customerView) renderCustomerDetail(_customerView);
  else renderCustomerList();
}

function saveCustomerForm(existingId) {
  const get = id => (document.getElementById('ac-' + id) || {}).value || '';
  const fname = get('fname').trim();
  if (!fname) { alert('First name is required.'); return; }
  const record = {
    firstName: fname,
    lastName:  get('lname').trim(),
    phone:     get('phone'),
    email:     get('email'),
    street:    get('street'),
    city:      get('city'),
    state:     get('state'),
    zip:       get('zip'),
    notes:     get('notes'),
  };
  if (existingId) {
    const custs = DB.get('pp_customers') || [];
    DB.set('pp_customers', custs.map(c => c.id === existingId ? Object.assign({}, c, record) : c));
  } else {
    DB.push('pp_customers', Object.assign({ id: uid() }, record));
  }
  renderCustomers();
}

function buildCustomerFormDOM(prefill, saveId) {
  const v    = prefill || {};
  const frag = document.createDocumentFragment();
  const grid = document.createElement('div');
  grid.className = 'form-grid';

  function makeField(id, labelText, placeholder, type, spanTwo, inputStyle) {
    const group = document.createElement('div');
    group.className = 'form-group';
    if (spanTwo) group.style.gridColumn = 'span 2';
    const lbl = document.createElement('label');
    lbl.textContent = labelText;
    const inp = document.createElement('input');
    inp.id = 'ac-' + id;
    if (type) inp.type = type;
    inp.placeholder = placeholder;
    inp.value = v[id] || '';
    if (inputStyle) inp.style.cssText = inputStyle;
    group.appendChild(lbl);
    group.appendChild(inp);
    return group;
  }

  grid.appendChild(makeField('fname',  'First Name', 'Jane',            '',      false, ''));
  grid.appendChild(makeField('lname',  'Last Name',  'Smith',           '',      false, ''));
  grid.appendChild(makeField('phone',  'Phone',      '555-000-0000',    '',      false, ''));
  grid.appendChild(makeField('email',  'Email',      'jane@example.com','email', false, ''));
  grid.appendChild(makeField('street', 'Street',     '123 Main St',     '',      false, ''));
  grid.appendChild(makeField('city',   'City',       'Springfield',     '',      false, ''));
  grid.appendChild(makeField('state',  'State',      'IL',              '',      false, 'max-width:80px'));
  grid.appendChild(makeField('zip',    'Zip',        '62701',           '',      false, 'max-width:120px'));
  grid.appendChild(makeField('notes',  'Notes',      'Anything to remember about this customer', '', true, ''));

  frag.appendChild(grid);

  const btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  btn.textContent = 'Save Customer';
  btn.addEventListener('click', () => saveCustomerForm(saveId || null));
  frag.appendChild(btn);
  return frag;
}

function deleteCustomer(id) {
  if (!confirm('Delete this customer record? Their job history will be kept.')) return;
  const custs = DB.get('pp_customers') || [];
  DB.set('pp_customers', custs.filter(c => c.id !== id));
  renderCustomerList();
}

function renderCustomerList() {
  const jobs   = DB.get('pp_jobs') || [];
  const stored = DB.get('pp_customers') || [];

  const seenNames = new Set(stored.map(c => (c.firstName + ' ' + c.lastName).toLowerCase()));
  const jobOnly   = [];
  const byName    = {};
  jobs.forEach(j => {
    if (!byName[j.customer]) byName[j.customer] = [];
    byName[j.customer].push(j);
    if (!seenNames.has(j.customer.toLowerCase())) {
      seenNames.add(j.customer.toLowerCase());
      jobOnly.push({ id: null, firstName: j.customer, lastName: '', phone: j.phone || '', email: '', city: '' });
    }
  });

  const allCustomers = [...stored, ...jobOnly].map(c => {
    const fullName   = c.firstName + (c.lastName ? ' ' + c.lastName : '');
    const cjobs      = (byName[fullName] || []).slice().sort((a, b) => b.date.localeCompare(a.date));
    const totalSpent = cjobs.filter(j => j.paid).reduce((s, j) => s + Number(j.labor) + Number(j.parts) + Number(j.tax || 0), 0);
    return Object.assign({}, c, { fullName, jobs: cjobs.length, totalSpent, lastVisit: cjobs[0] ? cjobs[0].date : '' });
  }).sort((a, b) => b.lastVisit.localeCompare(a.lastVisit));

  const searchQ = _customerSearch.trim().toLowerCase();
  const displayCustomers = searchQ
    ? allCustomers.filter(c =>
        c.fullName.toLowerCase().includes(searchQ) ||
        (c.phone || '').includes(searchQ) ||
        (c.email || '').toLowerCase().includes(searchQ)
      )
    : allCustomers;

  const totalRevenue = jobs.filter(j => j.paid).reduce((s, j) => s + Number(j.labor) + Number(j.parts), 0);

  const section = document.getElementById('customers');
  section.textContent = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  const title = document.createElement('div');
  title.className = 'page-title';
  title.textContent = 'Customers';
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary';
  addBtn.textContent = '+ Add Customer';
  addBtn.addEventListener('click', () => toggleForm('add-customer-form'));
  hdr.appendChild(title);
  hdr.appendChild(addBtn);
  section.appendChild(hdr);

  // Inline add form
  const formWrap = document.createElement('div');
  formWrap.className = 'add-form';
  formWrap.id = 'add-customer-form';
  formWrap.appendChild(buildCustomerFormDOM());
  section.appendChild(formWrap);

  // Totals bar
  const totals = document.createElement('div');
  totals.className = 'totals-bar';
  const t1 = document.createElement('div'); t1.className = 'total-item';
  const t1l = document.createElement('label'); t1l.textContent = 'Total Customers';
  const t1s = document.createElement('span'); t1s.textContent = allCustomers.length;
  t1.appendChild(t1l); t1.appendChild(t1s);
  const t2 = document.createElement('div'); t2.className = 'total-item';
  const t2l = document.createElement('label'); t2l.textContent = 'Total Revenue';
  const t2s = document.createElement('span'); t2s.style.color = 'var(--positive)'; t2s.textContent = fmt(totalRevenue);
  t2.appendChild(t2l); t2.appendChild(t2s);
  totals.appendChild(t1); totals.appendChild(t2);
  section.appendChild(totals);

  // Search
  const searchWrap = document.createElement('div');
  searchWrap.style.cssText = 'margin-bottom:16px';
  const searchInput = document.createElement('input');
  searchInput.placeholder = 'Search by name, phone, or email…';
  searchInput.value = _customerSearch;
  searchInput.style.cssText = 'background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:9px 12px;font-size:14px;font-family:var(--font);width:100%;max-width:360px;outline:none';
  searchInput.addEventListener('input', e => { _customerSearch = e.target.value; renderCustomerList(); });
  searchWrap.appendChild(searchInput);
  section.appendChild(searchWrap);

  // Table
  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  ['Name','Phone','Email','City','Jobs','Total Spent',''].forEach(h => {
    const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  if (displayCustomers.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 7; td.style.cssText = 'color:var(--muted);text-align:center;padding:24px';
    td.textContent = 'No customers yet';
    tr.appendChild(td); tbody.appendChild(tr);
  } else {
    displayCustomers.forEach(c => {
      const tr = document.createElement('tr');
      const cells = [
        { text: c.fullName, bold: true },
        { text: c.phone || '—', muted: true },
        { text: c.email || '—', muted: true },
        { text: c.city  || '—', muted: true },
        { text: c.jobs },
        { text: fmt(c.totalSpent), positive: true },
      ];
      cells.forEach(({ text, bold, muted, positive }) => {
        const td = document.createElement('td');
        if (bold) { const s = document.createElement('strong'); s.textContent = text; td.appendChild(s); }
        else td.textContent = text;
        if (muted)    td.style.color = 'var(--muted)';
        if (positive) td.style.color = 'var(--positive)';
        tr.appendChild(td);
      });
      const tdBtn = document.createElement('td');
      tdBtn.style.cssText = 'display:flex;gap:6px;align-items:center';
      const vBtn  = document.createElement('button');
      vBtn.className = 'btn btn-ghost';
      vBtn.style.cssText = 'font-size:11px;padding:4px 10px';
      vBtn.textContent = 'View →';
      vBtn.addEventListener('click', () => showCustomer(c.fullName));
      tdBtn.appendChild(vBtn);
      if (c.id) {
        const dBtn = document.createElement('button');
        dBtn.className = 'btn btn-danger';
        dBtn.textContent = '\u2715';
        dBtn.addEventListener('click', () => deleteCustomer(c.id));
        tdBtn.appendChild(dBtn);
      }
      tr.appendChild(tdBtn);
      tbody.appendChild(tr);
    });
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  section.appendChild(wrap);
}

// ── Follow-up modal (from job row) ────────────────────────────────────────────
let _fuCustomer = '';
let _fuPhone    = '';

function openFollowupModal(customerName, phone) {
  _fuCustomer = customerName;
  _fuPhone    = phone || '';
  document.getElementById('fu-modal-customer').textContent = customerName;
  const d = new Date(); d.setDate(d.getDate() + 7);
  document.getElementById('fu-modal-date').value = d.toISOString().slice(0, 10);
  document.getElementById('fu-modal-note').value = '';
  document.getElementById('fu-modal').style.display = 'flex';
}

function closeFollowupModal() {
  document.getElementById('fu-modal').style.display = 'none';
}

function saveFollowupModal() {
  const note    = (document.getElementById('fu-modal-note') || {}).value || '';
  const dueDate = (document.getElementById('fu-modal-date') || {}).value || '';
  if (!note.trim() || !dueDate) { alert('Please add a note and due date.'); return; }
  DB.push('pp_followups', { id: uid(), customerName: _fuCustomer, phone: _fuPhone, note: note.trim(), dueDate, done: false });
  closeFollowupModal();
}

function addFollowup(customerName, phone) {
  const note    = (document.getElementById('fu-note')  || {}).value || '';
  const dueDate = (document.getElementById('fu-date')  || {}).value || '';
  if (!note.trim() || !dueDate) { alert('Please add a note and due date.'); return; }
  DB.push('pp_followups', { id: uid(), customerName, phone, note: note.trim(), dueDate, done: false });
  renderCustomerDetail(customerName);
}

function markFollowupDoneFromCustomer(id, name) {
  const followups = DB.get('pp_followups') || [];
  DB.set('pp_followups', followups.map(f => f.id === id ? Object.assign({}, f, { done: true }) : f));
  renderCustomerDetail(name);
}

function renderCustomerFollowups(name, phone) {
  const container = document.getElementById('customers');
  const all = (DB.get('pp_followups') || [])
    .filter(f => f.customerName === name)
    .slice().sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  const d = new Date(); d.setDate(d.getDate() + 7);
  const defaultDate = d.toISOString().slice(0, 10);
  const todayStr = today();

  const wrapper = document.createElement('div');
  wrapper.style.marginTop = '28px';

  // Header row
  const hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  const lbl = document.createElement('div');
  lbl.style.cssText = 'font-weight:700;font-family:var(--font)';
  lbl.textContent = 'Follow-ups';
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary';
  addBtn.style.cssText = 'font-size:12px;padding:6px 14px';
  addBtn.textContent = '+ Follow-up';
  addBtn.addEventListener('click', () => toggleForm('fu-inline'));
  hdr.appendChild(lbl);
  hdr.appendChild(addBtn);
  wrapper.appendChild(hdr);

  // Inline form
  const form = document.createElement('div');
  form.className = 'add-form';
  form.id = 'fu-inline';

  const grid = document.createElement('div');
  grid.className = 'form-grid';

  const dateGroup = document.createElement('div');
  dateGroup.className = 'form-group';
  const dateLbl = document.createElement('label');
  dateLbl.textContent = 'Due Date';
  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  dateInput.id = 'fu-date';
  dateInput.value = defaultDate;
  dateGroup.appendChild(dateLbl);
  dateGroup.appendChild(dateInput);

  const noteGroup = document.createElement('div');
  noteGroup.className = 'form-group';
  noteGroup.style.gridColumn = 'span 2';
  const noteLbl = document.createElement('label');
  noteLbl.textContent = 'Note';
  const noteTA = document.createElement('textarea');
  noteTA.id = 'fu-note';
  noteTA.rows = 2;
  noteTA.placeholder = 'What to follow up about?';
  noteTA.style.cssText = 'width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px;color:var(--text);font-family:var(--font);font-size:13px;resize:vertical';
  noteGroup.appendChild(noteLbl);
  noteGroup.appendChild(noteTA);

  grid.appendChild(dateGroup);
  grid.appendChild(noteGroup);
  form.appendChild(grid);

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-primary';
  saveBtn.textContent = 'Save Follow-up';
  saveBtn.addEventListener('click', () => addFollowup(name, phone));
  form.appendChild(saveBtn);
  wrapper.appendChild(form);

  // Table
  const tableWrap = document.createElement('div');
  tableWrap.className = 'table-wrap';
  tableWrap.style.marginTop = '8px';
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  ['Due Date', 'Note', ''].forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  if (all.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 3;
    td.style.cssText = 'color:var(--muted);text-align:center;padding:12px';
    td.textContent = 'No follow-ups yet';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    all.forEach(f => {
      const tr = document.createElement('tr');
      tr.style.opacity = f.done ? '0.5' : '1';

      const tdDate = document.createElement('td');
      const overdue = !f.done && f.dueDate < todayStr;
      tdDate.style.color = overdue ? 'var(--negative)' : f.done ? 'var(--muted)' : 'inherit';
      tdDate.textContent = f.dueDate;

      const tdNote = document.createElement('td');
      tdNote.textContent = f.note;

      const tdAction = document.createElement('td');
      if (f.done) {
        const span = document.createElement('span');
        span.style.cssText = 'color:var(--muted);font-size:11px';
        span.textContent = 'Done';
        tdAction.appendChild(span);
      } else {
        const btn = document.createElement('button');
        btn.className = 'btn btn-success';
        btn.style.cssText = 'font-size:11px;padding:4px 10px';
        btn.textContent = 'Done';
        btn.addEventListener('click', () => markFollowupDoneFromCustomer(f.id, name));
        tdAction.appendChild(btn);
      }

      tr.appendChild(tdDate);
      tr.appendChild(tdNote);
      tr.appendChild(tdAction);
      tbody.appendChild(tr);
    });
  }
  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrapper.appendChild(tableWrap);
  container.appendChild(wrapper);
}

function renderCustomerDetail(name) {
  const custs     = DB.get('pp_customers') || [];
  const rec       = custs.find(c => (c.firstName + ' ' + c.lastName).trim() === name.trim()) || {};
  const jobs      = (DB.get('pp_jobs') || []).filter(j => j.customer === name)
                                              .slice().sort((a, b) => b.date.localeCompare(a.date));
  const phone       = rec.phone || (jobs[0] || {}).phone || '';
  const totalSpent  = jobs.filter(j => j.paid).reduce((s, j) => s + Number(j.labor) + Number(j.parts) + Number(j.tax || 0), 0);
  const outstanding = jobs.filter(j => !j.paid && j.status !== 'Closed')
                          .reduce((s, j) => s + Number(j.labor) + Number(j.parts) + Number(j.tax || 0), 0);
  const dates      = jobs.map(j => j.date).sort();
  const firstVisit = dates[0] || '';
  const lastVisit  = dates[dates.length - 1] || '';

  const section = document.getElementById('customers');
  section.textContent = '';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-ghost';
  backBtn.style.cssText = 'font-size:12px;padding:6px 14px';
  backBtn.textContent = '\u2190 All Customers';
  backBtn.addEventListener('click', () => showCustomer(null));
  const nameEl = document.createElement('div');
  nameEl.className = 'page-title';
  nameEl.style.marginBottom = '0';
  nameEl.textContent = name;
  hdr.appendChild(backBtn);
  hdr.appendChild(nameEl);
  if (rec.id) {
    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-ghost';
    editBtn.style.cssText = 'font-size:12px;padding:6px 14px';
    editBtn.textContent = 'Edit';
    editBtn.addEventListener('click', () => editCustomer(rec.id));
    hdr.appendChild(editBtn);
  }
  section.appendChild(hdr);

  // Contact card
  const contactFields = [
    ['Phone', rec.phone], ['Email', rec.email], ['Street', rec.street],
    ['City', rec.city], ['State', rec.state], ['Zip', rec.zip], ['Notes', rec.notes],
  ].filter(([, v]) => v);

  const contactCard = document.createElement('div');
  contactCard.className = 'card';
  contactCard.style.cssText = 'display:flex;gap:32px;flex-wrap:wrap;margin-bottom:20px';
  if (contactFields.length === 0) {
    const span = document.createElement('span');
    span.style.color = 'var(--muted)';
    span.textContent = 'No contact info on file';
    contactCard.appendChild(span);
  } else {
    contactFields.forEach(([label, val]) => {
      const item = document.createElement('div');
      const lbl  = document.createElement('div');
      lbl.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:1px';
      lbl.textContent = label;
      const valEl = document.createElement('div');
      valEl.textContent = val;
      item.appendChild(lbl);
      item.appendChild(valEl);
      contactCard.appendChild(item);
    });
  }
  section.appendChild(contactCard);

  // KPI grid
  const kpiGrid = document.createElement('div');
  kpiGrid.className = 'kpi-grid';
  kpiGrid.style.cssText = 'grid-template-columns:repeat(5,1fr);margin-bottom:20px';
  [
    { label: 'Total Spent',  value: fmt(totalSpent),  cls: 'kpi-positive' },
    { label: 'Outstanding',  value: fmt(outstanding), cls: 'kpi-negative' },
    { label: 'Total Jobs',   value: jobs.length,      cls: '' },
    { label: 'First Visit',  value: firstVisit || '—', cls: 'kpi-accent', small: true },
    { label: 'Last Visit',   value: lastVisit  || '—', cls: 'kpi-accent', small: true },
  ].forEach(({ label, value, cls, small }) => {
    const card = document.createElement('div');
    card.className = 'kpi-card';
    const lbl = document.createElement('div');
    lbl.className = 'kpi-label';
    lbl.textContent = label;
    const val = document.createElement('div');
    val.className = 'kpi-value' + (cls ? ' ' + cls : '');
    if (small) val.style.fontSize = '15px';
    val.textContent = value;
    card.appendChild(lbl);
    card.appendChild(val);
    kpiGrid.appendChild(card);
  });
  section.appendChild(kpiGrid);

  // Jobs table
  const wrap  = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const hrow  = document.createElement('tr');
  ['Date','Issue','Service','Labor','Parts','Total','Status','Paid'].forEach(h => {
    const th = document.createElement('th'); th.textContent = h; hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  if (jobs.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 8; td.style.cssText = 'color:var(--muted);text-align:center;padding:24px';
    td.textContent = 'No jobs';
    tr.appendChild(td); tbody.appendChild(tr);
  } else {
    jobs.forEach(j => {
      const total = Number(j.labor) + Number(j.parts) + Number(j.tax || 0);
      const tr    = document.createElement('tr');
      [
        { text: j.date },
        { text: j.issue },
        { text: j.service },
        { text: fmt(j.labor) },
        { text: fmt(j.parts) },
        { text: fmt(total), color: 'var(--positive)' },
      ].forEach(({ text, color }) => {
        const td = document.createElement('td');
        td.textContent = text;
        if (color) td.style.color = color;
        tr.appendChild(td);
      });
      const tdStatus = document.createElement('td');
      const badgeClsMap = { 'Pending':'pending','In Progress':'progress','Complete':'complete','Awaiting Parts':'awaiting','Closed':'closed','Warranty Claim':'warranty' };
      const badge = document.createElement('span');
      badge.className = 'badge badge-' + (badgeClsMap[j.status] || 'pending');
      badge.textContent = j.status;
      tdStatus.appendChild(badge);
      tr.appendChild(tdStatus);
      const tdPaid = document.createElement('td');
      const paidSpan = document.createElement('span');
      paidSpan.style.color = j.paid ? 'var(--positive)' : 'var(--negative)';
      paidSpan.textContent  = j.paid ? '\u2713 Paid' : 'Unpaid';
      tdPaid.appendChild(paidSpan);
      tr.appendChild(tdPaid);
      tbody.appendChild(tr);
    });
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  section.appendChild(wrap);

  renderCustomerFollowups(name, phone);
}

// ── Follow-ups section ────────────────────────────────────────────────────────
function renderFollowups() {
  const all      = DB.get('pp_followups') || [];
  const pending  = all.filter(f => !f.done).slice().sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  const todayStr = today();

  const section = document.getElementById('followups');
  section.textContent = '';

  const header = document.createElement('div');
  header.className = 'section-header';
  const title = document.createElement('div');
  title.className = 'page-title';
  title.textContent = 'Follow-ups';
  header.appendChild(title);
  section.appendChild(header);

  const wrap = document.createElement('div');
  wrap.className = 'table-wrap';
  const table = document.createElement('table');

  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  ['Due Date', 'Customer', 'Phone', 'Note', ''].forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  if (pending.length === 0) {
    const tr = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = 5;
    td.style.cssText = 'color:var(--muted);text-align:center;padding:24px';
    td.textContent = 'No pending follow-ups';
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    pending.forEach(f => {
      const overdue = f.dueDate < todayStr;
      const tr = document.createElement('tr');

      const tdDate = document.createElement('td');
      tdDate.style.color  = overdue ? 'var(--negative)' : 'inherit';
      tdDate.style.fontWeight = overdue ? '700' : '400';
      tdDate.textContent  = f.dueDate;
      if (overdue) {
        const badge = document.createElement('span');
        badge.style.fontSize = '10px';
        badge.textContent = ' OVERDUE';
        tdDate.appendChild(badge);
      }

      const tdCust = document.createElement('td');
      const strong = document.createElement('strong');
      strong.textContent = f.customerName;
      tdCust.appendChild(strong);

      const tdPhone = document.createElement('td');
      tdPhone.style.color = 'var(--muted)';
      tdPhone.textContent = f.phone || '—';

      const tdNote = document.createElement('td');
      tdNote.textContent = f.note;

      const tdBtn = document.createElement('td');
      const btn = document.createElement('button');
      btn.className = 'btn btn-success';
      btn.style.cssText = 'font-size:11px;padding:4px 10px';
      btn.textContent = 'Done';
      btn.addEventListener('click', () => markFollowupDone(f.id));
      tdBtn.appendChild(btn);

      tr.appendChild(tdDate);
      tr.appendChild(tdCust);
      tr.appendChild(tdPhone);
      tr.appendChild(tdNote);
      tr.appendChild(tdBtn);
      tbody.appendChild(tr);
    });
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  section.appendChild(wrap);
}

function markFollowupDone(id) {
  const followups = DB.get('pp_followups') || [];
  DB.set('pp_followups', followups.map(f => f.id === id ? Object.assign({}, f, { done: true }) : f));
  renderFollowups();
}

        <div class="form-group"><label>To</label>
          <input id="m-to" placeholder="Destination"></div>

    </div>

      <div class="total-item"><label>Total Miles (YTD)</label>
        <span style="color:var(--accent)">${totalMiles.toFixed(1)}</span></div>
      <div class="total-item"><label>Deduction @ $${esc(String(settings.irsRate))}/mi</label>
        <span style="color:var(--positive)">${fmt(totalDed)}</span></div>
      <div class="total-item"><label>Trips Logged</label><span>${entries.length}</span></div>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Date</th><th>From</th><th>To</th><th>Purpose</th>
        <th>Miles</th><th>Deduction</th><th>Notes</th><th></th>
      </tr></thead>
      <tbody>
        ${entries.length === 0
          ? '<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:24px">No trips logged yet</td></tr>'

function addMileage() {
  const miles = parseFloat(document.getElementById('m-miles').value);
  if (!miles || miles <= 0) { alert('Enter a valid mileage.'); return; }
  const rate = getSettings().irsRate;
  DB.push('pp_mileage', {
    id: uid(), date: document.getElementById('m-date').value,
    from: document.getElementById('m-from').value,
    to: document.getElementById('m-to').value,
    purpose: document.getElementById('m-purpose').value,
    miles, deduction: parseFloat((miles * rate).toFixed(2)),
    notes: document.getElementById('m-notes').value,
  });
  renderMileage();
}

function deleteMileage(id) {
  if (!confirm('Delete this trip?')) return;
  DB.del('pp_mileage', id);
  renderMileage();
}

function editMileage(id) {
  const entries = DB.get('pp_mileage') || [];

function saveEditMileage(id) {
  const miles = parseFloat(document.getElementById('mm-miles').value);

  const rate = getSettings().irsRate;

  })));

  renderMileage();
}

// ── Parts list helpers ────────────────────────────────────────────────────────
function addPartRow(listId, totalId) {
  const list = document.getElementById(listId);
  if (!list) return;
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;gap:6px;align-items:center';
  const nameInput = document.createElement('input');
  nameInput.placeholder = 'Part name';
  nameInput.style.cssText = 'flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:7px 10px;font-size:13px;font-family:var(--font)';
  const costInput = document.createElement('input');
  costInput.type = 'number'; costInput.step = '0.01'; costInput.placeholder = '0.00';
  costInput.style.cssText = 'width:90px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:7px 10px;font-size:13px;font-family:var(--font)';
  costInput.addEventListener('input', () => updatePartsTotal(listId, totalId));
  const removeBtn = document.createElement('button');
  removeBtn.type = 'button'; removeBtn.textContent = '✕';
  removeBtn.style.cssText = 'background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 4px';
  removeBtn.addEventListener('click', () => { row.remove(); updatePartsTotal(listId, totalId); });
  row.appendChild(nameInput); row.appendChild(costInput); row.appendChild(removeBtn);
  list.appendChild(row);
  nameInput.focus();
}

function updatePartsTotal(listId, totalId) {
  const list  = document.getElementById(listId);
  const total = document.getElementById(totalId);
  if (!list || !total) return;
  const sum = Array.from(list.querySelectorAll('input[type=number]'))
    .reduce((s, inp) => s + (parseFloat(inp.value) || 0), 0);
  total.textContent = sum > 0 ? 'Parts total: ' + fmt(sum) : '';
}

function getPartsList(listId) {
  const list = document.getElementById(listId);
  if (!list) return [];
  const rows = list.querySelectorAll('div');
  const parts = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0] ? inputs[0].value.trim() : '';
    const cost = inputs[1] ? parseFloat(inputs[1].value) || 0 : 0;
    if (name || cost > 0) parts.push({ name, cost });
  });
  return parts;
}

// ── Jobs section ─────────────────────────────────────────────────────────────
function statusBadge(status) {
  const cls = {
    'Pending': 'pending', 'In Progress': 'progress',
    'Complete': 'complete', 'Awaiting Parts': 'awaiting', 'Closed': 'closed',
    'Warranty Claim': 'warranty',
  };
  return `<span class="badge badge-${cls[status] || 'pending'}">${esc(status)}</span>`;
}

function autoFillCustomer() {
  const input = document.getElementById('j-fname');
  if (!input) return;
  const typed = input.value.trim();
  const custs = DB.get('pp_customers') || [];
  const match = custs.find(c =>
    (c.firstName + ' ' + c.lastName).toLowerCase() === typed.toLowerCase() ||
    c.firstName.toLowerCase() === typed.toLowerCase()
  );
  if (!match) return;
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('j-fname',  match.firstName);
  set('j-lname',  match.lastName);
  set('j-phone',  match.phone);
  set('j-email',  match.email);
  set('j-street', match.street);
  set('j-city',   match.city);
  set('j-state',  match.state);
  set('j-zip',    match.zip);
  document.getElementById('j-fname').dataset.customerId = match.id;
}

function addJob() {
  const fname = document.getElementById('j-fname').value.trim();
  const lname = document.getElementById('j-lname').value.trim();
  if (!fname) { alert('Customer first name is required.'); return; }
  const fullName = fname + (lname ? ' ' + lname : '');

  // Find or create customer record
  const custs    = DB.get('pp_customers') || [];
  const fnameEl  = document.getElementById('j-fname');
  let customerId = fnameEl.dataset.customerId || null;
  let customer   = customerId ? custs.find(c => c.id === customerId) : null;

  if (!customer) {
    customer = custs.find(c =>
      (c.firstName + ' ' + c.lastName).toLowerCase() === fullName.toLowerCase()
    );
  }

  const contactData = {
    firstName: fname,
    lastName:  lname,
    phone:     document.getElementById('j-phone').value,
    email:     document.getElementById('j-email').value,
    street:    document.getElementById('j-street').value,
    city:      document.getElementById('j-city').value,
    state:     document.getElementById('j-state').value,
    zip:       document.getElementById('j-zip').value,
  };

  if (customer) {
    customerId = customer.id;
    DB.set('pp_customers', custs.map(c =>
      c.id === customerId ? Object.assign({}, c, contactData) : c
    ));
  } else {
    customerId = uid();
    DB.push('pp_customers', Object.assign({ id: customerId, notes: '' }, contactData));
  }

  const partsList = getPartsList('j-parts-list');
  const parts     = partsList.length > 0
    ? partsList.reduce((s, p) => s + p.cost, 0)
    : 0;
  const tax       = parts * (getSettings().taxRate || 0);
  DB.push('pp_jobs', {
    id: uid(), date: document.getElementById('j-date').value,
    customer: fullName,
    customerId,
    phone:   contactData.phone,
    address: [contactData.street, contactData.city, contactData.state].filter(Boolean).join(', '),
    issue:   document.getElementById('j-issue').value,
    service: document.getElementById('j-service').value,
    labor:   parseFloat(document.getElementById('j-labor').value) || 0,
    parts,
    partsList: partsList.length > 0 ? partsList : undefined,
    tax,
    status:  document.getElementById('j-status').value,
    device:  document.getElementById('j-device').value.trim(),
    model:   document.getElementById('j-model').value.trim(),
    notes:   document.getElementById('j-notes').value.trim(),
    paid: false,
  });
  renderJobs();
}

function sendJobReadyEmail(job) {
  const user = fsauth.currentUser;
  if (!user) return;

  // Look up customer email
  const customers  = DB.get('pp_customers') || [];
  const customer   = job.customerId
    ? customers.find(c => c.id === job.customerId)
    : customers.find(c => (c.firstName + ' ' + c.lastName).trim() === job.customer.trim());
  const email = customer && customer.email ? customer.email.trim() : '';

  if (!email) {
    // No email on file — show a brief notice
    const notice = document.createElement('div');
    notice.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);'
      + 'border-radius:var(--radius);padding:12px 18px;font-family:var(--font);font-size:12px;'
      + 'color:var(--muted);z-index:999;max-width:300px';
    notice.textContent = 'Job marked complete \u2014 no email on file for ' + job.customer + '.';
    document.body.appendChild(notice);
    setTimeout(() => notice.remove(), 5000);
    return;
  }

  const settings = getSettings();
  const total    = (Number(job.labor) + Number(job.parts) + Number(job.tax || 0)).toFixed(2);

  fsdb.collection('mail').add({
    to: email,
    message: {
      subject: 'Your device is ready \u2014 ' + (settings.businessName || 'Pixel Patcher'),
      text: 'Hi ' + job.customer + ',\n\n'
        + 'Great news \u2014 your device is ready for pickup!\n\n'
        + 'Job: ' + job.issue + '\n'
        + (job.service ? 'Service: ' + job.service + '\n' : '')
        + 'Total: $' + total + '\n\n'
        + 'Payment accepted: Cash \u00b7 Venmo \u00b7 CashApp \u00b7 Square\n\n'
        + 'Questions? Text or call ' + (settings.phone || '540-300-2577') + '.\n\n'
        + 'Thanks for choosing ' + (settings.businessName || 'Pixel Patcher') + '!',
    },
  }).catch(err => console.warn('Failed to send job ready email:', err));
}

function markPaid(id, paymentMethod) {
  const jobs = DB.get('pp_jobs') || [];
  const job  = jobs.find(j => j.id === id);
  if (!job) return;
  const isWarranty = job.status === 'Warranty Claim';
  job.paid = true;
  if (!isWarranty) job.status = 'Complete';
  DB.set('pp_jobs', jobs);
  sendJobReadyEmail(job);
  if (!isWarranty) {
    DB.push('pp_income', {
      id: uid(), date: today(), type: 'Service', category: 'Repair',
      description: 'Job: ' + job.issue + ' \u2014 ' + job.customer,
      amount: Number(job.labor) + Number(job.parts),
      paymentMethod: paymentMethod || 'Cash', notes: 'Job ID ' + id,
    });
  }
  renderJobs();
}

function deleteJob(id) {
  if (!confirm('Delete this job?')) return;
  DB.del('pp_jobs', id);
  renderJobs();
}

  document.getElementById('edit-modal-title').textContent = 'Edit Job — ' + j.customer;
  document.getElementById('edit-modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label>Date</label>
        <input type="date" id="jm-date" value="${esc(j.date)}"></div>
      <div class="form-group"><label>First Name</label>

      <div class="form-group"><label>Last Name</label>
        <input id="jm-lname" value="${esc(lname)}"></div>

      <div class="form-group"><label>Issue</label>

      <div class="form-group"><label>Service Performed</label>
        <input id="jm-service" value="${esc(j.service || '')}"></div>
      <div class="form-group"><label>Labor ($)</label>
        <input type="number" step="0.01" id="jm-labor" value="${esc(String(j.labor || 0))}"></div>
      <div class="form-group" style="grid-column:span 2"><label>Parts / Materials</label>
        <div id="jm-parts-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:6px"></div>
        <button type="button" onclick="addPartRow('jm-parts-list','jm-parts-total')"
          style="background:var(--card);border:1px solid var(--border);color:var(--muted);
                 border-radius:var(--radius);padding:6px 14px;font-size:12px;cursor:pointer;
                 font-family:var(--font)">+ Add Part</button>
        <div id="jm-parts-total" style="margin-top:6px;font-size:13px;color:var(--accent)"></div>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="jm-status">${optionsHTML(JOB_STATUSES, j.status)}</select></div>
      <div class="form-group"><label>Device</label>
        <input id="jm-device" value="${esc(j.device || '')}"></div>
      <div class="form-group"><label>Model</label>
        <input id="jm-model" value="${esc(j.model || '')}"></div>
      <div class="form-group" style="grid-column:span 2"><label>Internal Notes</label>
        <textarea id="jm-notes" rows="2" style="width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px;color:var(--text);font-family:var(--font);font-size:13px;resize:vertical">${esc(j.notes || '')}</textarea></div>
    </div>
  `;
  document.getElementById('edit-modal-save').onclick = () => saveEditJob(id);
  document.getElementById('edit-modal').style.display = 'flex';
  // Pre-populate parts list
  if (j.partsList && j.partsList.length > 0) {
    j.partsList.forEach(p => {
      addPartRow('jm-parts-list', 'jm-parts-total');
      const list = document.getElementById('jm-parts-list');
      const rows = list.querySelectorAll('div');
      const lastRow = rows[rows.length - 1];
      const inputs  = lastRow.querySelectorAll('input');
      if (inputs[0]) inputs[0].value = p.name;
      if (inputs[1]) { inputs[1].value = p.cost; }
    });
    updatePartsTotal('jm-parts-list', 'jm-parts-total');
  } else if (j.parts > 0) {
    // Migrate existing single-value parts into a row
    addPartRow('jm-parts-list', 'jm-parts-total');

    const rows = list.querySelectorAll('div');

    if (inputs[1]) inputs[1].value = j.parts;

function saveEditJob(id) {
  const fname = document.getElementById('jm-fname').value.trim();
  if (!fname) { alert('Customer first name is required.'); return; }
  const lname    = document.getElementById('jm-lname').value.trim();
  const fullName = fname + (lname ? ' ' + lname : '');
  const partsList = getPartsList('jm-parts-list');
  const parts     = partsList.length > 0
    ? partsList.reduce((s, p) => s + p.cost, 0)
    : (parseFloat(document.getElementById('jm-parts') ? document.getElementById('jm-parts').value : '0') || 0);
  const tax      = parts * (getSettings().taxRate || 0);
  const jobs     = DB.get('pp_jobs') || [];
  DB.set('pp_jobs', jobs.map(j => j.id !== id ? j : Object.assign({}, j, {
    date:     document.getElementById('jm-date').value,
    customer: fullName,
    phone:    document.getElementById('jm-phone').value,
    issue:    document.getElementById('jm-issue').value,
    service:  document.getElementById('jm-service').value,
    labor:    parseFloat(document.getElementById('jm-labor').value) || 0,
    parts,
    partsList: partsList.length > 0 ? partsList : undefined,
    tax,
    status:  document.getElementById('jm-status').value,
    device:  document.getElementById('jm-device').value.trim(),
    model:   document.getElementById('jm-model').value.trim(),
    notes:   document.getElementById('jm-notes').value.trim(),
  })));
  closeEditModal();
  renderJobs();
}

// ── Invoice section ──────────────────────────────────────────────────────────
let currentInvoiceJobId = null;

function openInvoice(jobId) {
  currentInvoiceJobId = jobId;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector('[data-section="invoice"]').classList.add('active');
  document.getElementById('invoice').classList.add('active');
  renderInvoice();
}

function renderInvoice() {
  const s    = getSettings();
  const jobs = DB.get('pp_jobs') || [];

  if (jobs.length === 0) {
    document.getElementById('invoice').innerHTML = `
      <div class="page-title">Invoice</div>
      <div class="card" style="max-width:500px;color:var(--muted)">
        No jobs yet. Add a job first, then click the Invoice button on any job row.
      </div>`;
    return;
  }

  if (!currentInvoiceJobId) {
    document.getElementById('invoice').innerHTML = `
      <div class="page-title">Invoice</div>
      <div class="card" style="max-width:420px">
        <div class="form-group">
          <label>Select a Job</label>
          <select onchange="currentInvoiceJobId=this.value;renderInvoice()">
            <option value="">&mdash; choose a job &mdash;</option>
            ${jobs.map((j, i) =>
              `<option value="${esc(j.id)}">#${i+1} &mdash; ${esc(j.customer)} &mdash; ${esc(j.issue)}</option>`
            ).join('')}
          </select>
        </div>
      </div>`;
    return;
  }

  const job = jobs.find(j => j.id === currentInvoiceJobId);
  if (!job) { currentInvoiceJobId = null; renderInvoice(); return; }

  const tax    = Number(job.tax || 0);
  const total  = Number(job.labor) + Number(job.parts) + tax;
  const jobNum = jobs.indexOf(job) + 1;
  const invNum = 'PP-' + new Date().getFullYear() + '-' + String(jobNum).padStart(3, '0');

  document.getElementById('invoice').innerHTML = `
    <div class="section-header">
      <div class="page-title">Invoice ${esc(invNum)}</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost"
