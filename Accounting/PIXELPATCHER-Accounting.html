<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Patcher — Accounting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000000; --sidebar: #0a0a0a; --card: #141410; --border: #2a2410;
      --accent: #C9A000; --positive: #22c55e; --negative: #ef4444;
      --warning: #4B2A8C; --text: #EDE8DC; --muted: #7a6a50;
      --radius: 8px; --font: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      --font-pixel: 'Press Start 2P', 'Courier New', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; }
    #app { display: flex; height: 100vh; }
    #sidebar {
      width: 185px; min-width: 185px; background: var(--sidebar);
      border-right: 1px solid var(--border); display: flex;
      flex-direction: column; padding: 20px 12px;
    }
    .logo { font-family: var(--font-pixel); font-size: 8px; letter-spacing: 1px;
            color: var(--accent); margin-bottom: 28px; padding: 0 4px; line-height: 1.6; }
    nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .nav-btn {
      background: none; border: none; color: var(--muted); text-align: left;
      padding: 10px 12px; border-radius: var(--radius); cursor: pointer;
      font-size: 14px; font-family: var(--font); transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--card); color: var(--text); }
    .nav-btn.active { background: var(--accent); color: #000; font-weight: 700; }
    .sidebar-footer { display: flex; flex-direction: column; gap: 6px;
                      padding-top: 16px; border-top: 1px solid var(--border); margin-top: 16px; }
    .sidebar-footer button {
      background: var(--card); border: 1px solid var(--border); color: var(--muted);
      border-radius: var(--radius); padding: 7px; font-size: 12px; cursor: pointer;
      font-family: var(--font);
    }
    .sidebar-footer button:hover { border-color: var(--accent); color: var(--text); }
    #main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .section { display: none; }
    .section.active { display: block; }
    .page-title { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--accent); letter-spacing: 0.5px; }
    .card { background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 18px 20px; }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                 letter-spacing: 1px; margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 700; }
    .kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .kpi-positive { color: var(--positive); }
    .kpi-negative { color: var(--negative); }
    .kpi-accent   { color: var(--accent); }
    .kpi-warning  { color: var(--warning); }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                 gap: 12px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; color: var(--muted); }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--radius); padding: 9px 12px; font-size: 14px;
      font-family: var(--font); outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(201,160,0,0.15); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .btn { border: none; border-radius: var(--radius); padding: 9px 18px;
           font-size: 14px; cursor: pointer; font-family: var(--font);
           font-weight: 500; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
    .btn-success { background: var(--positive); color: #fff; }
    .btn-danger  { background: var(--negative); color: #fff; font-size: 12px; padding: 5px 10px; }
    .btn-ghost   { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: var(--muted); font-size: 11px;
         text-transform: uppercase; letter-spacing: 0.5px;
         border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    .badge { display: inline-block; padding: 3px 9px; border-radius: 20px;
             font-size: 11px; font-weight: 600; }
    .badge-pending  { background: rgba(245,158,11,0.15);  color: var(--warning); }
    .badge-progress { background: rgba(79,142,247,0.15);  color: var(--accent); }
    .badge-complete { background: rgba(34,197,94,0.15);   color: var(--positive); }
    .badge-awaiting { background: rgba(100,116,139,0.15); color: var(--muted); }
    .badge-closed   { background: rgba(100,116,139,0.10); color: var(--muted); }
    .section-header { display: flex; align-items: center; justify-content: space-between;
                      margin-bottom: 20px; }
    .totals-bar { display: flex; gap: 24px; margin-bottom: 20px; background: var(--card);
                  border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; }
    .total-item label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
    .total-item span  { font-size: 18px; font-weight: 700; }
    .add-form { background: var(--card); border: 1px solid var(--border);
                border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: none; }
    .add-form.open { display: block; }
    .chart-bar-wrap { display: flex; align-items: flex-end; gap: 6px;
                      height: 140px; padding-bottom: 4px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .chart-col-bars { flex: 1; width: 100%; display: flex;
                      flex-direction: column; justify-content: flex-end; gap: 2px; }
    .bar-income, .bar-expense { width: 100%; border-radius: 3px 3px 0 0; min-height: 0; }
    .bar-income  { background: var(--positive); }
    .bar-expense { background: var(--negative); }
    .chart-label { font-size: 10px; }
  </style>
</head>
<body>
<div id="receipt-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85);
     z-index:999; align-items:center; justify-content:center; flex-direction:column;">
  <div style="background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
              padding:32px; width:320px; text-align:center;">
    <div style="font-family:var(--font); font-size:13px; color:var(--text);
                font-weight:700; margin-bottom:24px;">Attach Receipt</div>
    <div style="display:flex; gap:12px; justify-content:center; margin-bottom:20px;">
      <button onclick="document.getElementById('receipt-file-input').click()"
        style="background:var(--accent); color:#000; border:none; padding:12px 20px;
               font-size:13px; font-weight:700; border-radius:var(--radius); cursor:pointer;
               font-family:var(--font);">
        &#128193; Choose File
      </button>
      <button onclick="document.getElementById('receipt-camera-input').click()"
        style="background:var(--card); color:var(--text); border:1px solid var(--border);
               padding:12px 20px; font-size:13px; font-weight:700; border-radius:var(--radius);
               cursor:pointer; font-family:var(--font);">
        &#128247; Take Photo
      </button>
    </div>
    <div id="receipt-progress"
         style="font-size:12px; color:var(--muted); font-family:var(--font); min-height:18px;">
    </div>
    <button onclick="closeReceiptModal()"
      style="margin-top:16px; background:none; border:none; color:var(--muted);
             font-size:12px; cursor:pointer; font-family:var(--font);">
      Cancel
    </button>
    <input id="receipt-file-input"   type="file" accept="image/*"
           style="display:none" onchange="handleReceiptFile(event)">
    <input id="receipt-camera-input" type="file" accept="image/*" capture="environment"
           style="display:none" onchange="handleReceiptFile(event)">
  </div>
</div>

<div id="signin-overlay" style="display:flex; position:fixed; inset:0; background:#000;
     z-index:1000; align-items:center; justify-content:center; flex-direction:column;">
  <div style="font-family:var(--font-pixel); font-size:9px; color:var(--accent);
              letter-spacing:1px; margin-bottom:12px;">&#9632; PIXEL PATCHER</div>
  <div style="font-size:12px; color:var(--muted); margin-bottom:40px;
              font-family:var(--font);">Accounting</div>
  <button onclick="signInWithGoogle()"
    style="background:var(--accent); color:#000; border:none; padding:14px 32px;
           font-size:14px; font-weight:700; border-radius:var(--radius); cursor:pointer;
           font-family:var(--font);">
    Sign in with Google
  </button>
  <div id="signin-error"
    style="color:var(--negative); font-size:12px; margin-top:16px; font-family:var(--font);">
  </div>
</div>

<div id="app">
  <aside id="sidebar">
    <div class="logo">&#9632; PIXEL PATCHER</div>
    <nav>
      <button class="nav-btn active" data-section="dashboard">Dashboard</button>
      <button class="nav-btn" data-section="jobs">Jobs</button>
      <button class="nav-btn" data-section="invoice">Invoice</button>
      <button class="nav-btn" data-section="expenses">Expenses</button>
      <button class="nav-btn" data-section="mileage">Mileage</button>
      <button class="nav-btn" data-section="settings">Settings</button>
    </nav>
    <div class="sidebar-footer">
      <div id="sync-status" style="font-size:11px; text-align:center;
           padding: 4px 0 8px; font-family:var(--font); color:var(--muted)">
        &#x25CB; Not connected
      </div>
      <button onclick="exportCSV()">Export CSV</button>
      <button onclick="exportJSON()">Backup JSON</button>
      <button onclick="importJSON()">Restore JSON</button>
    </div>
  </aside>
  <main id="main">
    <section id="dashboard" class="section active"></section>
    <section id="jobs"      class="section"></section>
    <section id="invoice"   class="section"></section>
    <section id="expenses"  class="section"></section>
    <section id="mileage"   class="section"></section>
    <section id="settings"  class="section"></section>
  </main>
</div>
<script>
// ── Firebase init ─────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyD9DXFXJEudx4ODE-P1yYxAniM4jtqytJY",
  authDomain: "pixelpatcher-accounting.firebaseapp.com",
  projectId: "pixelpatcher-accounting",
  storageBucket: "pixelpatcher-accounting.firebasestorage.app",
  messagingSenderId: "1070850498937",
  appId: "1:1070850498937:web:774c2fb89d1da372a00fa8"
};
firebase.initializeApp(firebaseConfig);
const fsdb      = firebase.firestore();
const fsauth    = firebase.auth();
const fsstorage = firebase.storage();

// ── Auth ─────────────────────────────────────────────────────────────────────
const FS_KEYS = ['pp_settings','pp_income','pp_expenses','pp_mileage','pp_jobs','pp_seeded'];

function showSignInOverlay() {
  document.getElementById('signin-overlay').style.display = 'flex';
}
function hideSignInOverlay() {
  document.getElementById('signin-overlay').style.display = 'none';
}

function signInWithGoogle() {
  document.getElementById('signin-error').textContent = '';
  const provider = new firebase.auth.GoogleAuthProvider();
  fsauth.signInWithPopup(provider).catch(() => {
    document.getElementById('signin-error').textContent = 'Sign-in failed. Please try again.';
  });
}

// ── Sync status ───────────────────────────────────────────────────────────────
function updateSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const span = document.createElement('span');
  if (state === 'syncing') {
    span.style.color = 'var(--accent)';
    span.textContent = '\u27F3 Syncing';
  } else if (state === 'synced') {
    span.style.color = 'var(--positive)';
    span.textContent = '\u25CF Synced';
  } else {
    span.style.color = 'var(--muted)';
    span.textContent = '\u25CB Offline';
  }
  el.textContent = '';
  el.appendChild(span);
}

// ── Firestore write helper ────────────────────────────────────────────────────
function firestoreSet(key, value) {
  const user = fsauth.currentUser;
  if (!user || !FS_KEYS.includes(key)) return;
  updateSyncStatus('syncing');
  fsdb.collection('users').doc(user.uid).collection('data').doc(key)
    .set({ value })
    .then(() => updateSyncStatus('synced'))
    .catch(err => {
      console.warn('Firestore write failed:', err);
      updateSyncStatus('offline');
    });
}

// ── Load from Firestore on login ──────────────────────────────────────────────
async function loadFromFirestore(uid) {
  updateSyncStatus('syncing');
  try {
    const snap = await fsdb.collection('users').doc(uid).collection('data').get();
    if (!snap.empty) {
      snap.forEach(doc => {
        localStorage.setItem(doc.id, JSON.stringify(doc.data().value));
      });
    }
    updateSyncStatus('synced');
  } catch (err) {
    console.warn('Firestore load failed, using localStorage:', err);
    updateSyncStatus('offline');
  }
}

// ── Auth state handler ────────────────────────────────────────────────────────
fsauth.onAuthStateChanged(async user => {
  if (user) {
    hideSignInOverlay();
    await loadFromFirestore(user.uid);
    seedData();
    renderDashboard();
  } else {
    showSignInOverlay();
  }
});

// ── Receipt upload ────────────────────────────────────────────────────────────
let _receiptExpenseId = null;

function openReceiptModal(expenseId) {
  _receiptExpenseId = expenseId;
  document.getElementById('receipt-progress').textContent = '';
  document.getElementById('receipt-file-input').value   = '';
  document.getElementById('receipt-camera-input').value = '';
  const modal = document.getElementById('receipt-modal');
  modal.style.display = 'flex';
}

function closeReceiptModal() {
  document.getElementById('receipt-modal').style.display = 'none';
  _receiptExpenseId = null;
}

function handleReceiptFile(event) {
  const file = event.target.files[0];
  if (!file || !_receiptExpenseId) return;
  const user = fsauth.currentUser;
  if (!user) return;

  const progressEl = document.getElementById('receipt-progress');
  progressEl.textContent = 'Uploading\u2026';

  const path = 'users/' + user.uid + '/receipts/' + _receiptExpenseId;
  const ref  = fsstorage.ref(path);

  ref.put(file).then(snapshot => snapshot.ref.getDownloadURL()).then(url => {
    const expenses = DB.get('pp_expenses') || [];
    DB.set('pp_expenses', expenses.map(e =>
      e.id === _receiptExpenseId ? Object.assign({}, e, { receiptUrl: url }) : e
    ));
    closeReceiptModal();
    renderExpenses();
  }).catch(err => {
    console.warn('Receipt upload failed:', err);
    progressEl.textContent = 'Upload failed. Please try again.';
  });
}

function viewReceipt(url) {
  window.open(url, '_blank', 'noopener');
}

// ── XSS safety: all user strings escaped before innerHTML insertion ──────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Navigation ───────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    const id = btn.dataset.section;
    document.getElementById(id).classList.add('active');
    renderSection(id);
  });
});

function renderSection(name) {
  if (name === 'dashboard') renderDashboard();
  else if (name === 'jobs')     renderJobs();
  else if (name === 'expenses') renderExpenses();
  else if (name === 'mileage')  renderMileage();
  else if (name === 'settings') renderSettings();
  else if (name === 'invoice')  renderInvoice();
}

// ── Storage ──────────────────────────────────────────────────────────────────
const DB = {
  get:  key       => JSON.parse(localStorage.getItem(key) || 'null'),
  set:  (key, v)  => {
    localStorage.setItem(key, JSON.stringify(v));
    firestoreSet(key, v);
  },
  push: (key, obj) => { const a = DB.get(key) || []; a.push(obj); DB.set(key, a); },
  del:  (key, id)  => DB.set(key, (DB.get(key) || []).filter(x => x.id !== id)),
};

const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
const today = () => new Date().toISOString().slice(0, 10);
const fmt   = n => '$' + Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

// ── Constants ────────────────────────────────────────────────────────────────
const EXPENSE_CATS = ['Tools & Equipment','Marketing','Licenses & Permits',
                      'Software','Insurance','Vehicle','Parts (resale)','Misc'];
const PAY_METHODS  = ['Cash','Venmo','CashApp','Square','Check','Card','Transfer'];
const JOB_STATUSES = ['Pending','In Progress','Complete','Awaiting Parts','Closed'];

function optionsHTML(arr, selected = '') {
  return arr.map(v =>
    `<option value="${esc(v)}"${v === selected ? ' selected' : ''}>${esc(v)}</option>`
  ).join('');
}

function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── Settings ─────────────────────────────────────────────────────────────────
function defaultSettings() {
  return { businessName: 'Pixel Patcher', phone: '540-300-2577',
           website: 'pixelpatcher.com', address: '', irsRate: 0.70, taxReserve: 0.25 };
}
function getSettings() { return DB.get('pp_settings') || defaultSettings(); }

// ── Seed data (runs once) ────────────────────────────────────────────────────
function seedData() {
  if (DB.get('pp_seeded')) return;
  DB.set('pp_settings', defaultSettings());
  DB.set('pp_income', [{
    id: 'seed-1', date: '2026-02-26', type: 'Owner Contribution', category: 'Capital',
    description: 'Initial business funding', amount: 200, paymentMethod: 'Transfer',
    notes: 'Seed money from personal funds',
  }]);
  DB.set('pp_expenses', [
    { id: 'seed-2', date: '2026-02-26', category: 'Licenses & Permits',
      description: 'City of Roanoke business license', vendor: 'City of Roanoke',
      amount: 50, paymentMethod: 'Check', notes: 'Annual renewal due March 1' },
    { id: 'seed-3', date: '2026-02-26', category: 'Insurance',
      description: 'General Liability Insurance - Feb', vendor: 'Next Insurance',
      amount: 31.25, paymentMethod: 'Card', notes: 'Monthly recurring ~$31.25/mo' },
  ]);
  DB.set('pp_mileage', []);
  DB.set('pp_jobs',    []);
  DB.set('pp_seeded',  true);
}

// ── Settings section ─────────────────────────────────────────────────────────
function renderSettings() {
  const s = getSettings();
  document.getElementById('settings').innerHTML = `
    <div class="page-title">Settings</div>
    <div class="card" style="max-width:600px">
      <div class="form-grid">
        <div class="form-group"><label>Business Name</label>
          <input id="s-name" value="${esc(s.businessName)}"></div>
        <div class="form-group"><label>Phone</label>
          <input id="s-phone" value="${esc(s.phone)}"></div>
        <div class="form-group"><label>Website</label>
          <input id="s-website" value="${esc(s.website)}"></div>
        <div class="form-group"><label>Address</label>
          <input id="s-address" value="${esc(s.address)}"></div>
        <div class="form-group"><label>IRS Mileage Rate ($/mile)</label>
          <input type="number" step="0.01" id="s-irs" value="${esc(s.irsRate)}"></div>
        <div class="form-group"><label>Tax Reserve %</label>
          <input type="number" step="1" id="s-tax" value="${Math.round(s.taxReserve * 100)}"></div>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>
  `;
}

function saveSettings() {
  DB.set('pp_settings', {
    businessName: document.getElementById('s-name').value,
    phone:        document.getElementById('s-phone').value,
    website:      document.getElementById('s-website').value,
    address:      document.getElementById('s-address').value,
    irsRate:      parseFloat(document.getElementById('s-irs').value) || 0.70,
    taxReserve:   (parseFloat(document.getElementById('s-tax').value) || 25) / 100,
  });
  alert('Settings saved.');
}

// ── Expenses section ─────────────────────────────────────────────────────────
function renderExpenses() {
  const expenses = DB.get('pp_expenses') || [];
  const total = expenses.reduce((s, e) => s + Number(e.amount), 0);
  document.getElementById('expenses').innerHTML = `
    <div class="section-header">
      <div class="page-title">Expenses</div>
      <button class="btn btn-primary" onclick="toggleForm('expense-form')">+ Add Expense</button>
    </div>
    <div class="add-form" id="expense-form">
      <div class="form-grid">
        <div class="form-group"><label>Date</label>
          <input type="date" id="e-date" value="${today()}"></div>
        <div class="form-group"><label>Category</label>
          <select id="e-cat">${optionsHTML(EXPENSE_CATS)}</select></div>
        <div class="form-group"><label>Description</label>
          <input id="e-desc" placeholder="What was purchased"></div>
        <div class="form-group"><label>Vendor</label>
          <input id="e-vendor" placeholder="Where you bought it"></div>
        <div class="form-group"><label>Amount ($)</label>
          <input type="number" step="0.01" id="e-amt" placeholder="0.00"></div>
        <div class="form-group"><label>Payment Method</label>
          <select id="e-pay">${optionsHTML(PAY_METHODS)}</select></div>
        <div class="form-group"><label>Notes</label>
          <input id="e-notes" placeholder="Optional"></div>
      </div>
      <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
    </div>
    <div class="totals-bar">
      <div class="total-item"><label>Total Expenses (YTD)</label>
        <span style="color:var(--negative)">${fmt(total)}</span></div>
      <div class="total-item"><label>Entries</label><span>${expenses.length}</span></div>
    </div>

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  const settings = getSettings();
  const income   = DB.get('pp_income')   || [];
  const expenses = DB.get('pp_expenses') || [];
  const mileage  = DB.get('pp_mileage')  || [];
  const jobs     = DB.get('pp_jobs')     || [];

  const revenue    = income.filter(i => i.type !== 'Owner Contribution')
                           .reduce((s, i) => s + Number(i.amount), 0);
  const totalExp   = expenses.reduce((s, e) => s + Number(e.amount), 0);
  const netProfit  = revenue - totalExp;
  const jobsDone   = jobs.filter(j => j.status === 'Complete' || j.status === 'Closed').length;
  const avgJob     = jobsDone > 0 ? revenue / jobsDone : 0;
  const totalMiles = mileage.reduce((s, m) => s + Number(m.miles), 0);
  const mileDed    = mileage.reduce((s, m) => s + Number(m.deduction), 0);
  const taxReserve = Math.max(0, netProfit * settings.taxReserve);

  const mInc = Array(12).fill(0);
  const mExp = Array(12).fill(0);
  income.filter(i => i.type !== 'Owner Contribution').forEach(i => {
    const d = new Date(i.date);
    if (d.getFullYear() === 2026) mInc[d.getMonth()] += Number(i.amount);
  });
  expenses.forEach(e => {
    const d = new Date(e.date);
    if (d.getFullYear() === 2026) mExp[d.getMonth()] += Number(e.amount);
  });
  const maxVal = Math.max(...mInc, ...mExp, 1);
  const curMon = new Date().getMonth();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const kpi = (label, value, cls, sub) => `
    <div class="kpi-card">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value ${cls}">${value}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`;

  document.getElementById('dashboard').innerHTML = `
    <div class="page-title">Dashboard &mdash; 2026</div>
    <div class="kpi-grid">
      ${kpi('Total Income',   fmt(revenue),   revenue > 0 ? 'kpi-positive' : '', 'Year to Date')}
      ${kpi('Total Expenses', fmt(totalExp),  'kpi-negative', 'Year to Date')}
      ${kpi('Net Profit',     fmt(netProfit), netProfit >= 0 ? 'kpi-positive' : 'kpi-negative', 'Year to Date')}
      ${kpi('Jobs Completed', jobsDone,       'kpi-accent',   'Year to Date')}
      ${kpi('Avg Job Value',  fmt(avgJob),    avgJob > 0 ? 'kpi-positive' : '', 'Per Completed Job')}
      ${kpi('Miles Driven',   totalMiles.toFixed(1), 'kpi-accent', 'Total YTD')}
      ${kpi('Mileage Deduction', fmt(mileDed), 'kpi-positive', 'IRS $' + settings.irsRate + '/mile')}
      ${kpi('Tax Reserve (' + Math.round(settings.taxReserve * 100) + '%)',
            fmt(taxReserve), 'kpi-warning', 'Set This Aside')}
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:600;color:var(--muted);
                  text-transform:uppercase;letter-spacing:1px;margin-bottom:16px">
        Monthly Breakdown &mdash; 2026
      </div>
      <div class="chart-bar-wrap">
        ${months.map((m, i) => {
          const hInc = Math.round((mInc[i] / maxVal) * 110);
          const hExp = Math.round((mExp[i] / maxVal) * 110);
          const dim  = i === curMon ? '' : 'opacity:0.45;';
          const bold = i === curMon ? 'font-weight:700;color:var(--text)' : 'color:var(--muted)';
          return `
            <div class="chart-col">
              <div class="chart-col-bars">
                <div class="bar-income"  style="height:${hInc}px;${dim}" title="Income: ${fmt(mInc[i])}"></div>
                <div class="bar-expense" style="height:${hExp}px;${dim}" title="Expenses: ${fmt(mExp[i])}"></div>
              </div>
              <div class="chart-label" style="${bold}">${m}</div>
            </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted)">
        <span><span style="color:var(--positive)">&#9632;</span> Income</span>
        <span><span style="color:var(--negative)">&#9632;</span> Expenses</span>
      </div>
    </div>
  `;
}

// ── Export / Import ──────────────────────────────────────────────────────────
function exportCSV() {
  const sections = [
    { name: 'INCOME',   rows: DB.get('pp_income')   || [] },
    { name: 'EXPENSES', rows: DB.get('pp_expenses') || [] },
    { name: 'MILEAGE',  rows: DB.get('pp_mileage')  || [] },
    { name: 'JOBS',     rows: DB.get('pp_jobs')     || [] },
  ];
  const csvEsc = v => {
    const s = String(v ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n')
      ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  let out = '';
  sections.forEach(({ name, rows }) => {
    if (rows.length === 0) return;
    out += '\n' + name + '\n';
    out += Object.keys(rows[0]).map(csvEsc).join(',') + '\n';
    rows.forEach(r => { out += Object.values(r).map(csvEsc).join(',') + '\n'; });
  });
  const blob = new Blob([out.trim()], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PixelPatcher-' + today() + '.csv';
  a.click();
}

function exportJSON() {
  const data = {
    income: DB.get('pp_income') || [], expenses: DB.get('pp_expenses') || [],
    mileage: DB.get('pp_mileage') || [], jobs: DB.get('pp_jobs') || [],
    settings: getSettings(), exportedAt: new Date().toISOString(),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'PixelPatcher-backup-' + today() + '.json';
  a.click();
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.income)   DB.set('pp_income',   data.income);
        if (data.expenses) DB.set('pp_expenses',  data.expenses);
        if (data.mileage)  DB.set('pp_mileage',   data.mileage);
        if (data.jobs)     DB.set('pp_jobs',      data.jobs);
        if (data.settings) DB.set('pp_settings',  data.settings);
        alert('Import successful. Reloading...');
        location.reload();
      } catch {
        alert('Import failed \u2014 file may be corrupted or wrong format.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Initial render triggered by fsauth.onAuthStateChanged above
</script>
